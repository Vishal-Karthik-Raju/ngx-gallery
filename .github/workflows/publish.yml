name: Publish to npm

on:
  push:
    tags:
      - 'v*'          # triggers on tags like v21.0.3, v21.1.0, etc.

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build library
        run: npx ng build "@vishal/ngx-gallery" --configuration production

      - name: Publish to npm
        run: npm publish ./dist/gallery --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
